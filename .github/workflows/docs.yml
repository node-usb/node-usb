name: docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 20.x
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: yarn install --ignore-scripts
      - run: yarn compile
      - run: yarn docs
      - run: touch docs/.nojekyll
      - name: Create Pages artifact
        shell: bash
        run: |
          set -euxo pipefail
          chmod -R u+rwX,go+rX docs
          tar --dereference --hard-dereference \
              --owner=0 --group=0 --numeric-owner \
              -C docs -cvf "$RUNNER_TEMP/artifact.tar" .
          gzip -n "$RUNNER_TEMP/artifact.tar"
      - name: Inspect docs output
        run: |
          set -eux
          ls -la docs
          find docs -maxdepth 2 -print
      - name: Upload Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar.gz

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
